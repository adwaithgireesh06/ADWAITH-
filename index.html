<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Mark Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Student Mark Calculator</h2>
        
        <div class="input-group">
            <label>Subject 1:</label>
            <input type="number" id="mark1" placeholder="Enter marks">
        </div>

        <div class="input-group">
            <label>Subject 2:</label>
            <input type="number" id="mark2" placeholder="Enter marks">
        </div>

        <div class="input-group">
            <label>Subject 3:</label>
            <input type="number" id="mark3" placeholder="Enter marks">
        </div>

        <button onclick="calculateMarks()">Calculate</button>

        <div id="result" class="result-box">
            <p id="totalText">Total = </p>
            <p id="averageText">Average = </p>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
